<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>Start Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #eee;
      border-top: 6px solid #64c5eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    /* SCREEN 1 */
    #screen1 {
      height: 100vh;
      background: url("Screenshot-1.png") no-repeat center/cover;
      position: relative;
    }

    /* FIX CHUẨN */
    .start-btn {
      position: absolute;
      top: 44%;
      left: 50%;
      transform: translate(-50%, -50%);

      padding: 15px 40px;
      font-size: 40px;
      background: none;
      color: white;
      border: none;
      border-radius: 8px;
      width: 300px;
      height: 300px;

    }

    /* SCREEN 2 */
    #screen2 {
      display: none;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .title {
      margin-bottom: 10px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-top: 2px solid #5bbad5;
      border-bottom: 2px solid #5bbad5;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    .label {
      width: 180px;
      background: #d9edf4;
      font-weight: bold;
    }

    .input-area input,
    .input-area select {
      padding: 12px;
      margin-right: 8px;
    }

    .notice {
      color: red;
      font-size: 12px;
      margin-top: 10px;
    }

    .guide-btn {
      display: inline-block;
      margin-top: 5px;
      background: #5bbad5;
      color: #fff;
      padding: 3px 8px;
      font-size: 12px;
      border-radius: 3px;
      text-decoration: none;
    }

    .submit-btn {
      display: block;
      margin: 20px auto;
      background: #2da3d9;
      color: #fff;
      border: none;
      padding: 10px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #1b8bbf;
    }

    /* SCREEN 3 */

      background-color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo img {
      max-width: 120px;
      width: 100%;
      height: auto;
    }

    /* Header xanh */
    .header-title {
      background-color: #64c5eb;
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 0;
    }

    /* Table */
    .table2 {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0;
    }

    th {
      background-color: #f2f2f2;
      color: #666;
      font-weight: normal;
      font-size: 13px;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    td {
      padding: 15px 10px;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }

    /* Button View */
    .btn-view {
      background-color: #64c5eb;
      color: white;
      border: none;
      padding: 5px 15px;
      border-radius: 15px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }

    /* Warning Text */
    .warning-text {
      color: red;
      font-size: 13px;
      text-align: left;
      margin-top: 10px;
      padding-left: 5px;
    }

    /* Footer Text */
    .footer-msg {
      margin-top: 40px;
      color: #555;
      line-height: 1.6;
      font-weight: bold;
    }

    /* Button End */
    .btn-end {
      margin-top: 20px;

      border: 2px solid #64c5eb;
      color: #333;
      padding: 10px 40px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;

    .btn-end:hover {

    }








    #screen4 {

    .containe {

      padding-top: 20px;
    }

    .top-img {
      width: 220px;
      border-radius: 12px;
    }

    .blink-text {
      font-weight: bold;

    }

    @keyframes blinkColor {
      0% {
        color: red;
      }

      50% {
        color: blue;
      }

      100% {
        color: red;
      }
    }

    .more-btn {

    }

    .video-box {

    }

    video,
    img {
      width: 280px;
      border-radius: 10px;
    }

    .xanh {

    }
  </style>
</head>

    <script>
      const loader = document.getElementById("loader");
      const screen1 = document.getElementById("screen1");
      const screen2 = document.getElementById("screen2");
      const screen3 = document.getElementById("screen3");
      const screen4 = document.getElementById("screen4");
      const result = document.getElementById("result");
      const year = document.getElementById("year");
      const month = document.getElementById("month");
      const day = document.getElementById("day");
      function showGif() {
        document.getElementById("videoBox").style.display = "block";
      }
    </script>

    <script>
      // chuyển màn
      function goNext() {
        loader.style.display = "flex"; // hiện loading

        setTimeout(() => {
          loader.style.display = "none";

          screen1.style.display = "none";
          screen2.style.display = "block";
        }, 800);
      }

      // tạo ngày tháng
      for (let y = 2025; y >= 1921; y--) year.add(new Option(y, y));
      for (let m = 1; m <= 12; m++) month.add(new Option(m, m));

      function updateDays() {
        let d = new Date(year.value, month.value, 0).getDate();
        day.innerHTML = "";
        for (let i = 1; i <= d; i++) day.add(new Option(i, i));
      }
      year.onchange = updateDays;
      month.onchange = updateDays;
      updateDays();

      // kiểm tra
      function checkBirth() {
        if (year.value == "2025" && month.value == "1" && day.value == "1") {

          loader.style.display = "flex";

          setTimeout(() => {
            loader.style.display = "none";

            screen2.style.display = "none";
            screen3.style.display = "flex";
          }, 600);
        } else {
          result.innerText = "❌ NGÀY SINH ANH HÙNG MÀ @ KHÔNG BIẾT À ))) CHỊU RỒI";
        }

      }

        setTimeout(() => {

          screen3.style.display = "none";
          screen4.style.display = "block";
        }, 800);

        setTimeout(() => {

          screen3.style.display = "none";
          screen1.style.display = "block";
